name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check x4_catalog/ tests/

      - name: Format check
        run: uv run ruff format --check x4_catalog/ tests/

      - name: Type check
        run: uv run mypy x4_catalog/ tests/

      - name: Tests
        run: uv run pytest --tb=short
